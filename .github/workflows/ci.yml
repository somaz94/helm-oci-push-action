name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run ShellCheck on entrypoint.sh
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          ignore_paths: '.devcontainer .github'

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build action image
        run: docker build -t helm-oci-push-action:ci .

      - name: Verify helm version inside image
        run: docker run --rm --entrypoint helm helm-oci-push-action:ci version --short

  test-action:
    name: Test Action (${{ matrix.mode }})
    runs-on: ubuntu-latest
    needs: [shellcheck, docker-build]
    strategy:
      fail-fast: false
      matrix:
        mode: [tarballs, charts, charts_dir]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Helm (for fixture packaging)
        uses: azure/setup-helm@v5
        with:
          version: v3.16.4

      - name: Create fixture chart
        run: |
          mkdir -p fixtures/charts/test-chart/templates
          cat > fixtures/charts/test-chart/Chart.yaml <<'YAML'
          apiVersion: v2
          name: test-chart
          version: 0.1.0
          appVersion: "1.0.0"
          description: CI fixture chart
          type: application
          YAML
          cat > fixtures/charts/test-chart/templates/configmap.yaml <<'YAML'
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: test-chart
          data:
            hello: world
          YAML

      - name: Pre-package (tarballs mode only)
        if: matrix.mode == 'tarballs'
        run: |
          mkdir -p dist
          helm package fixtures/charts/test-chart -d dist/

      - name: Run action — tarballs mode
        if: matrix.mode == 'tarballs'
        id: tarballs
        uses: ./
        with:
          tarballs: dist/*.tgz
          dry_run: true
          registry_login: false

      - name: Run action — charts mode
        if: matrix.mode == 'charts'
        id: charts
        uses: ./
        with:
          charts: fixtures/charts/test-chart
          dry_run: true
          registry_login: false

      - name: Run action — charts_dir mode
        if: matrix.mode == 'charts_dir'
        id: charts_dir
        uses: ./
        with:
          charts_dir: fixtures/charts
          dry_run: true
          registry_login: false

      - name: Verify outputs
        run: |
          PUSHED="${{ steps.tarballs.outputs.pushed_charts }}${{ steps.charts.outputs.pushed_charts }}${{ steps.charts_dir.outputs.pushed_charts }}"
          SKIPPED="${{ steps.tarballs.outputs.skipped_charts }}${{ steps.charts.outputs.skipped_charts }}${{ steps.charts_dir.outputs.skipped_charts }}"
          echo "Mode: ${{ matrix.mode }}"
          echo "pushed_charts: $PUSHED"
          echo "skipped_charts: $SKIPPED"
          if [ -n "$PUSHED" ]; then
            echo "::error::dry_run was true but pushed_charts is non-empty"
            exit 1
          fi
          if ! echo "$SKIPPED" | grep -q 'test-chart:0.1.0'; then
            echo "::error::expected 'test-chart:0.1.0' in skipped_charts (dry-run), got: $SKIPPED"
            exit 1
          fi
          echo "[PASS] ${{ matrix.mode }} matrix"

  ci-result:
    name: CI Result
    if: always()
    needs: [shellcheck, docker-build, test-action]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.shellcheck.result }}" != "success" ]] || \
             [[ "${{ needs.docker-build.result }}" != "success" ]] || \
             [[ "${{ needs.test-action.result }}" != "success" ]]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed"
